spring.application.name=ExemploSpringBoot

# ===============================
# CONEXAO COM O BANCO DE DADOS
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vendas_online_2}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURACOES DO JPA/HIBERNATE
# ===============================
# Dialeto do PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Estrategia de geracao do schema
# create: cria as tabelas (apaga dados existentes)
# update: atualiza o schema (mantem dados)
# validate: apenas valida se o schema esta correto
# none: nao faz nenhuma alteracao
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL no console (util para desenvolvimento)
spring.jpa.show-sql=true

# Formatar SQL para melhor legibilidade
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CONEXAO COM O BANCO (POOL DE CONEXOES)
# ===============================
# Numero maximo de conexoes ativas
spring.datasource.hikari.maximum-pool-size=10

# Tempo maximo de espera por uma conexao (em ms)
spring.datasource.hikari.connection-timeout=20000

# Tempo maximo que uma conexao pode ficar inativa (em ms)
spring.datasource.hikari.idle-timeout=300000

management.endpoints.web.exposure.include=*



